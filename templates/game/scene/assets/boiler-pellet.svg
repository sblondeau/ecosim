<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 152" width="108" height="152" overflow="visible">
    <!-- Chaudière à granulés : même encombrement que le fioul (108×152, même
         emplacement dans le local technique) mais une silhouette délibérément
         DIFFÉRENTE — corps plus étroit + SILO accolé. C'est ce silo qui porte
         la leçon : le bois-énergie s'approvisionne et se stocke, là où le fioul
         se contentait d'une cuve invisible.
         Pas d'état de panne ici : la panne scriptée du scénario ne frappe que
         la chaudière fioul d'origine. Seule couche pilotée : .flame (via
         scene:Boiler → .boiler--pellet). -->
    <defs>
        <linearGradient id="pBody" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#5c4638"/><stop offset=".5" stop-color="#7d6250"/><stop offset="1" stop-color="#4e392d"/>
        </linearGradient>
        <linearGradient id="pSilo" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#a98a5f"/><stop offset=".5" stop-color="#c7a878"/><stop offset="1" stop-color="#8e7350"/>
        </linearGradient>
    </defs>

    <!-- conduit de fumée -->
    <path d="M20 4 v34 h10" stroke="#55636f" stroke-width="7" fill="none" stroke-linecap="round"/>

    <!-- corps : foyer + porte vitrée (le feu se voit, contrairement au fioul) -->
    <rect x="6" y="34" width="50" height="88" rx="7" fill="url(#pBody)"/>
    <rect x="6" y="34" width="50" height="12" rx="6" fill="#8a6c57"/>
    <rect x="14" y="56" width="34" height="30" rx="4" fill="#1c242e"/>
    <rect x="14" y="56" width="34" height="30" rx="4" fill="none" stroke="#3d4a56" stroke-width="2.5"/>
    <path class="flame" d="M25 84 q3 -14 6 -18 q3 4 6 18 q-3 4 -6 4 q-3 0 -6 -4z" fill="#f0a03c"/>
    <path class="flame" d="M29 84 q2 -8 2 -11 q3 3 4 11 q-2 2 -3 2 q-2 0 -3 -2z" fill="#ffd489"/>
    <!-- bandeau de commande -->
    <rect x="14" y="96" width="34" height="12" rx="3" fill="#1c242e"/>
    <circle cx="22" cy="102" r="2.6" fill="#7fd49a"/>
    <rect x="29" y="100" width="15" height="4" rx="2" fill="#3d4a56"/>
    <!-- pieds -->
    <rect x="12" y="122" width="6" height="8" rx="2" fill="#3a2c23"/>
    <rect x="44" y="122" width="6" height="8" rx="2" fill="#3a2c23"/>

    <!-- silo à granulés : trémie sur pieds, vis d'alimentation vers le foyer -->
    <path d="M64 30 h38 v66 l-14 20 h-10 l-14 -20z" fill="url(#pSilo)"/>
    <rect x="64" y="30" width="38" height="9" rx="3" fill="#6f5940"/>
    <!-- hublot de niveau : on voit le stock de granulés -->
    <rect x="72" y="48" width="22" height="40" rx="3" fill="#2b2119"/>
    <g fill="#d8b985">
        <rect x="75" y="60" width="6" height="3" rx="1.5"/>
        <rect x="84" y="58" width="6" height="3" rx="1.5" transform="rotate(24 87 59.5)"/>
        <rect x="76" y="68" width="6" height="3" rx="1.5" transform="rotate(-18 79 69.5)"/>
        <rect x="85" y="69" width="6" height="3" rx="1.5"/>
        <rect x="74" y="77" width="6" height="3" rx="1.5" transform="rotate(12 77 78.5)"/>
        <rect x="83" y="78" width="6" height="3" rx="1.5" transform="rotate(-30 86 79.5)"/>
    </g>
    <rect x="72" y="48" width="22" height="40" rx="3" fill="none" stroke="#5c4938" stroke-width="2"/>
    <!-- vis sans fin : le silo alimente le foyer -->
    <path d="M78 116 q-12 6 -22 6 h-8" stroke="#6f5940" stroke-width="6" fill="none" stroke-linecap="round"/>
    <rect x="70" y="120" width="6" height="10" rx="2" fill="#3a2c23"/>
    <rect x="90" y="120" width="6" height="10" rx="2" fill="#3a2c23"/>
</svg>
