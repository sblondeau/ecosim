<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" width="520" height="400" overflow="visible">
    <!-- La maison en COUPE : murs en tranche (couche d'isolant pilotée par
         .ins-tier-N sur la scène), combles ouverts, séjour visible (teinte =
         confort), local technique vide (le renderer y pose le chauffage).
         Pas de sous-sol, pas de porte de façade : on regarde DANS la maison. -->
    <defs>
        <linearGradient id="hRoof" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#8a4f43"/><stop offset="1" stop-color="#6d3d34"/>
        </linearGradient>
        <linearGradient id="hGlass" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#93b3cf"/><stop offset="1" stop-color="#6d8aa6"/>
        </linearGradient>
        <pattern id="hTiles" width="34" height="16" patternUnits="userSpaceOnUse" patternTransform="skewX(-24)">
            <rect width="34" height="16" fill="#7a453a"/>
            <path d="M0 15h34" stroke="#5f342b" stroke-width="2"/>
            <path d="M17 0v15" stroke="#5f342b" stroke-width="1.4"/>
        </pattern>
    </defs>

    <!-- ===== combles (intérieur sous toiture) ===== -->
    <polygon points="56,140 260,56 464,140" fill="#3a4756"/>
    <!-- isolant des combles, posé sur le plafond : épaisseur/couleur par palier -->
    <rect class="ins-attic ins-attic-0" x="48" y="134" width="424" height="6" fill="#7d7466"/>
    <rect class="ins-attic ins-attic-1" x="48" y="128" width="424" height="12" fill="#5f9c74"/>
    <rect class="ins-attic ins-attic-2" x="48" y="122" width="424" height="18" fill="#69b585"/>
    <!-- plafond -->
    <rect x="36" y="140" width="448" height="12" fill="#6b5a45"/>

    <!-- ===== toiture (bandeau de coupe épais + tuiles) ===== -->
    <polygon points="2,142 260,18 518,142 466,142 260,52 54,142" fill="url(#hRoof)"/>
    <polygon points="16,136 260,26 504,136 474,136 260,48 46,136" fill="url(#hTiles)"/>
    <!-- neige : trois habillages selon l'isolation (déperditions), sous .frost -->
    <g class="roof-snow roof-snow-0" fill="#f2f6fa">
        <path d="M18 136 q22 -16 46 -28 q-6 16 -14 28 q-16 3 -32 0z"/>
        <path d="M502 136 q-22 -16 -46 -28 q6 16 14 28 q16 3 32 0z"/>
    </g>
    <g class="roof-snow roof-snow-1" fill="#f2f6fa">
        <path d="M18 136 q60 -34 110 -56 q-10 22 -22 40 q-44 12 -88 16z"/>
        <path d="M502 136 q-60 -34 -110 -56 q10 22 22 40 q44 12 88 16z"/>
    </g>
    <g class="roof-snow roof-snow-2" fill="#f2f6fa">
        <path d="M16 138 q122 -58 244 -112 q122 54 244 112 l-22 0 q-111 -50 -222 -100 q-111 50 -222 100z"/>
    </g>
    <!-- cheminée sur le versant droit -->
    <g>
        <rect x="372" y="48" width="26" height="44" fill="#8a7460"/>
        <rect x="367" y="40" width="36" height="10" rx="2" fill="#6e5c4c"/>
        <g class="chimney-smoke" fill="#b9c4ce">
            <circle class="puff p1" cx="385" cy="30" r="6"/>
            <circle class="puff p2" cx="395" cy="22" r="4.5"/>
            <circle class="puff p3" cx="377" cy="18" r="3.5"/>
        </g>
    </g>

    <!-- ===== murs en tranche (gauche / droite) ===== -->
    <g>
        <rect x="26" y="152" width="20" height="232" fill="#b9a582"/>
        <rect x="26" y="152" width="5" height="232" fill="#cbb794"/>
        <rect class="ins-wall ins-wall-1" x="42" y="152" width="6" height="232" fill="#5f9c74"/>
        <rect class="ins-wall ins-wall-2" x="40" y="152" width="10" height="232" fill="#69b585"/>
    </g>
    <g>
        <rect x="474" y="152" width="20" height="232" fill="#b9a582"/>
        <rect x="489" y="152" width="5" height="232" fill="#a08c69"/>
        <rect class="ins-wall ins-wall-1" x="472" y="152" width="6" height="232" fill="#5f9c74"/>
        <rect class="ins-wall ins-wall-2" x="470" y="152" width="10" height="232" fill="#69b585"/>
    </g>

    <!-- ===== séjour (la teinte de fond = confort ressenti) ===== -->
    <rect class="room-tint" x="46" y="152" width="306" height="220" fill="#31465c"/>
    <!-- fenêtre du mur du fond -->
    <g>
        <rect x="84" y="196" width="92" height="84" rx="3" fill="#8a7458"/>
        <rect x="90" y="202" width="80" height="72" fill="url(#hGlass)"/>
        <path d="M130 202v72 M90 238h80" stroke="#8a7458" stroke-width="5"/>
    </g>
    <!-- cadre au mur -->
    <rect x="240" y="210" width="44" height="34" fill="#6b5a45"/>
    <rect x="245" y="215" width="34" height="24" fill="#87a08b"/>
    <!-- radiateur sous la fenêtre -->
    <g>
        <rect x="88" y="330" width="84" height="34" rx="4" fill="#aab7c2"/>
        <g stroke="#8895a1" stroke-width="3">
            <path d="M98 334v26 M112 334v26 M126 334v26 M140 334v26 M154 334v26"/>
        </g>
    </g>
    <!-- canapé -->
    <g>
        <rect x="214" y="318" width="110" height="30" rx="8" fill="#5d4d72"/>
        <rect x="206" y="308" width="20" height="56" rx="8" fill="#4e3f61"/>
        <rect x="312" y="308" width="20" height="56" rx="8" fill="#4e3f61"/>
        <rect x="214" y="340" width="110" height="24" rx="5" fill="#6c5a84"/>
    </g>

    <!-- ===== cloison + local technique (vide : le renderer pose l'équipement) ===== -->
    <rect x="352" y="152" width="12" height="220" fill="#8a7f6d"/>
    <rect x="364" y="152" width="110" height="220" fill="#232e3a"/>

    <!-- ===== plancher / dalle ===== -->
    <rect x="26" y="372" width="468" height="12" fill="#7d6b52"/>
    <rect x="26" y="372" width="468" height="3" fill="#94815f"/>
</svg>
