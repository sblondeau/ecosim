<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" width="520" height="400" overflow="visible">
    <!-- La maison en COUPE : murs en tranche (couche d'isolant pilotée par
         .house--* du composant scene:HouseShell), séjour visible (teinte =
         confort), local technique vide (le renderer y pose le chauffage). Le
         toit, lui, reste un plein classique (pas de coupe) : il ne porte pas
         d'information de jeu propre (l'isolation se lit sur les murs) et une
         surface unique, non ambiguë, est ce qui permet aux panneaux solaires
         de se poser bien à plat dessus (cf. scene:SolarPanels).
         Pas de sous-sol, pas de porte de façade : on regarde DANS la maison. -->
    <defs>
        <linearGradient id="hRoof" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#8a4f43"/><stop offset="1" stop-color="#6d3d34"/>
        </linearGradient>
        <linearGradient id="hGlass" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#93b3cf"/><stop offset="1" stop-color="#6d8aa6"/>
        </linearGradient>
        <pattern id="hTiles" width="34" height="16" patternUnits="userSpaceOnUse" patternTransform="skewX(-24)">
            <rect width="34" height="16" fill="#7a453a"/>
            <path d="M0 15h34" stroke="#5f342b" stroke-width="2"/>
            <path d="M17 0v15" stroke="#5f342b" stroke-width="1.4"/>
        </pattern>
    </defs>

    <!-- plafond -->
    <rect x="36" y="140" width="448" height="12" fill="#6b5a45"/>

    <!-- ===== toiture (plein, un seul versant net par pan — même triangle que
         le hit-polygon du slot roof dans _cutaway.html.twig) ===== -->
    <polygon points="2,142 260,18 518,142" fill="url(#hRoof)"/>
    <polygon points="16,136 260,26 504,136" fill="url(#hTiles)"/>
    <!-- neige : deux habillages selon l'isolation des combles (un toit non isolé
         laisse fuir la chaleur → la neige fond ; isolé, elle tient), sous .frost -->
    <g class="roof-snow roof-snow-bare" fill="#f2f6fa">
        <path d="M18 136 q22 -16 46 -28 q-6 16 -14 28 q-16 3 -32 0z"/>
        <path d="M502 136 q-22 -16 -46 -28 q6 16 14 28 q16 3 32 0z"/>
    </g>
    <g class="roof-snow roof-snow-insulated" fill="#f2f6fa">
        <path d="M16 138 q122 -58 244 -112 q122 54 244 112 l-22 0 q-111 -50 -222 -100 q-111 50 -222 100z"/>
    </g>
    <!-- cheminée sur le versant droit -->
    <g>
        <rect x="372" y="48" width="26" height="44" fill="#8a7460"/>
        <rect x="367" y="40" width="36" height="10" rx="2" fill="#6e5c4c"/>
        <g class="chimney-smoke" fill="#b9c4ce">
            <circle class="puff p1" cx="385" cy="30" r="6"/>
            <circle class="puff p2" cx="395" cy="22" r="4.5"/>
            <circle class="puff p3" cx="377" cy="18" r="3.5"/>
        </g>
    </g>

    <!-- ===== débord de toit : sous-face (referme le surplomb au-dessus des
         murs, x 2-26 et 494-518) + gouttière filante sur tout l'égout, sinon
         le toit semble « flotter » au-dessus de la maison sans s'y raccorder ===== -->
    <rect x="2" y="142" width="24" height="10" fill="#5c4f3d"/>
    <rect x="494" y="142" width="24" height="10" fill="#5c4f3d"/>
    <rect x="0" y="139" width="520" height="5" rx="2" fill="#6b7278"/>
    <rect x="0" y="139" width="520" height="1.5" rx=".75" fill="#8b9298"/>

    <!-- ===== murs en tranche (gauche / droite) ===== -->
    <g>
        <rect x="26" y="152" width="20" height="232" fill="#b9a582"/>
        <rect x="26" y="152" width="5" height="232" fill="#cbb794"/>
    </g>
    <g>
        <rect x="474" y="152" width="20" height="232" fill="#b9a582"/>
        <rect x="489" y="152" width="5" height="232" fill="#a08c69"/>
    </g>

    <!-- ===== séjour (la teinte de fond = confort ressenti) ===== -->
    <rect class="room-tint" x="46" y="152" width="306" height="220" fill="#31465c"/>
    <!-- fenêtre du mur du fond -->
    <g>
        <rect x="82" y="194" width="96" height="88" rx="4" fill="#6b5a45"/>
        <rect x="84" y="196" width="92" height="84" rx="3" fill="#8a7458"/>
        <rect x="90" y="202" width="80" height="72" fill="url(#hGlass)"/>
        <path d="M92 204 L128 204 L98 272 L92 272 Z" fill="#ffffff" opacity=".12"/>
        <!-- vitrages : chaque vitre supplémentaire = une lame de verre de plus,
             dessinée comme une bordure claire imbriquée dans la feuillure
             (simple = aucune, double = 1, triple = 2). Le rendement décroissant
             se lit à l'œil : la 2e lame est plus fine et plus pâle que la 1re. -->
        <rect class="glazing-pane glazing-pane-2" x="93" y="205" width="74" height="66" fill="none" stroke="#e8f4ff" stroke-width="4" opacity=".8"/>
        <rect class="glazing-pane glazing-pane-3" x="99" y="211" width="62" height="54" fill="none" stroke="#e8f4ff" stroke-width="2.5" opacity=".55"/>
        <path d="M130 202v72 M90 238h80" stroke="#8a7458" stroke-width="5"/>
        <rect x="90" y="202" width="80" height="72" rx="1" fill="none" stroke="#6b5a45" stroke-width="1.5"/>
        <!-- appui de fenêtre + jardinière -->
        <rect x="78" y="280" width="104" height="7" rx="2" fill="#7d6b52"/>
        <rect x="78" y="280" width="104" height="2" fill="#94815f"/>
        <g transform="translate(144 250)">
            <path d="M0 16 L26 16 L23 30 L3 30 Z" fill="#9a6a4c"/>
            <path d="M0 16 L26 16 L26 20 L0 20 Z" fill="#7d6b52"/>
            <g fill="#3d5c46">
                <circle cx="6" cy="10" r="7"/><circle cx="14" cy="6" r="8"/><circle cx="21" cy="11" r="6"/>
            </g>
        </g>
    </g>
    <!-- cadre au mur -->
    <rect x="240" y="210" width="44" height="34" fill="#6b5a45"/>
    <rect x="245" y="215" width="34" height="24" fill="#87a08b"/>
    <!-- radiateur sous la fenêtre -->
    <g>
        <ellipse cx="130" cy="368" rx="46" ry="4" fill="#000" opacity=".14"/>
        <rect x="87" y="316" width="86" height="45" rx="5" fill="#8f9ba5"/>
        <rect x="87" y="316" width="86" height="5" rx="2.5" fill="#c3ccd4"/>
        <g fill="#a3aeb7">
            <rect x="92" y="323" width="6" height="35" rx="2.5"/>
            <rect x="104" y="323" width="6" height="35" rx="2.5"/>
            <rect x="116" y="323" width="6" height="35" rx="2.5"/>
            <rect x="128" y="323" width="6" height="35" rx="2.5"/>
            <rect x="140" y="323" width="6" height="35" rx="2.5"/>
            <rect x="152" y="323" width="6" height="35" rx="2.5"/>
            <rect x="164" y="323" width="6" height="35" rx="2.5"/>
        </g>
        <g fill="#7d8892">
            <rect x="92" y="323" width="2" height="35" rx="1"/>
            <rect x="104" y="323" width="2" height="35" rx="1"/>
            <rect x="116" y="323" width="2" height="35" rx="1"/>
            <rect x="128" y="323" width="2" height="35" rx="1"/>
            <rect x="140" y="323" width="2" height="35" rx="1"/>
            <rect x="152" y="323" width="2" height="35" rx="1"/>
            <rect x="164" y="323" width="2" height="35" rx="1"/>
        </g>
        <!-- vanne thermostatique -->
        <rect x="79" y="354" width="6" height="10" rx="2" fill="#7d8892"/>
        <circle cx="82" cy="352" r="5" fill="#8f9ba5" stroke="#7d8892" stroke-width="1.5"/>
        <!-- pieds -->
        <rect x="94" y="361" width="4" height="7" rx="1.5" fill="#7d8892"/>
        <rect x="162" y="361" width="4" height="7" rx="1.5" fill="#7d8892"/>
    </g>
    <!-- canapé -->
    <g>
        <ellipse cx="269" cy="368" rx="68" ry="6" fill="#000" opacity=".16"/>
        <!-- dossier -->
        <rect x="216" y="302" width="106" height="44" rx="12" fill="#4e3f61"/>
        <!-- coussins de dossier -->
        <rect x="222" y="308" width="45" height="30" rx="10" fill="#5d4d72"/>
        <rect x="271" y="308" width="45" height="30" rx="10" fill="#5d4d72"/>
        <!-- accoudoirs -->
        <rect x="206" y="308" width="20" height="56" rx="9" fill="#4e3f61"/>
        <rect x="312" y="308" width="20" height="56" rx="9" fill="#4e3f61"/>
        <rect x="209" y="311" width="14" height="8" rx="4" fill="#5d4d72" opacity=".7"/>
        <rect x="315" y="311" width="14" height="8" rx="4" fill="#5d4d72" opacity=".7"/>
        <!-- assise (deux coussins) -->
        <rect x="214" y="338" width="110" height="26" rx="9" fill="#6c5a84"/>
        <path d="M269 340v22" stroke="#5d4d72" stroke-width="3" stroke-linecap="round"/>
        <rect x="219" y="342" width="44" height="6" rx="3" fill="#7a688f" opacity=".6"/>
        <rect x="275" y="342" width="44" height="6" rx="3" fill="#7a688f" opacity=".6"/>
        <!-- pieds -->
        <rect x="212" y="362" width="6" height="8" rx="2" fill="#3d3350"/>
        <rect x="320" y="362" width="6" height="8" rx="2" fill="#3d3350"/>
    </g>

    <!-- ===== cloison + local technique (vide : le renderer pose l'équipement) ===== -->
    <rect x="352" y="152" width="12" height="220" fill="#8a7f6d"/>
    <rect x="364" y="152" width="110" height="220" fill="#232e3a"/>

    <!-- ===== couches d'isolation, une par surface (révélées par les classes
         .house--* posées par scene:HouseShell). Dessinées en fin de document
         pour passer AU-DESSUS du séjour et du local technique : ce sont des
         doublages posés contre les parois, pas des couches enfouies.

         ITI et ITE isolent la même paroi mais du côté opposé, et c'est tout
         le contraste pédagogique : l'ITI mange le volume habitable et se voit
         seulement dans la coupe ; l'ITE habille la FAÇADE (visible depuis
         dehors, sous le débord de toit) et laisse l'intérieur intact. ===== -->
    <!-- combles : l'isolant déroulé sous le plafond -->
    <g class="roof-ins">
        <rect x="46" y="152" width="428" height="11" fill="#69b585"/>
        <rect x="46" y="152" width="428" height="2.5" fill="#8ccca6"/>
    </g>
    <!-- murs, isolation par l'INTÉRIEUR (doublage côté séjour / local) -->
    <g class="ins-wall">
        <rect x="46" y="152" width="9" height="232" fill="#69b585"/>
        <rect x="46" y="152" width="2.5" height="232" fill="#8ccca6"/>
        <rect x="465" y="152" width="9" height="232" fill="#69b585"/>
        <rect x="471.5" y="152" width="2.5" height="232" fill="#8ccca6"/>
    </g>
    <!-- murs, isolation par l'EXTÉRIEUR : isolant + enduit de finition, plaqués
         sur la façade, sous l'égout -->
    <g class="wall-ext-ins">
        <rect x="14" y="152" width="12" height="232" fill="#69b585"/>
        <rect x="8" y="152" width="6" height="232" fill="#c9bda3"/>
        <rect x="8" y="152" width="2" height="232" fill="#ddd2ba"/>
        <rect x="494" y="152" width="12" height="232" fill="#69b585"/>
        <rect x="506" y="152" width="6" height="232" fill="#c8bca4"/>
        <rect x="510" y="152" width="2" height="232" fill="#b3a68e"/>
    </g>

    <!-- VMC double flux : le caisson se loge en haut du local technique (au-
         dessus de la chaudière), et sa gaine traverse la cloison pour venir
         souffler dans le séjour — c'est ce trajet qui dit ce qu'une VMC fait :
         elle déplace de l'air d'une pièce à l'autre, elle ne chauffe rien. -->
    <g class="vmc">
        <path d="M372 182 H322" stroke="#7f8b96" stroke-width="9" stroke-linecap="round"/>
        <path d="M372 182 H322" stroke="#9aa6b1" stroke-width="3" stroke-linecap="round" opacity=".5"/>
        <rect x="370" y="166" width="56" height="34" rx="5" fill="#8f9ba5"/>
        <rect x="370" y="166" width="56" height="7" rx="3.5" fill="#c3ccd4"/>
        <g stroke="#6c7883" stroke-width="2">
            <path d="M378 180h40 M378 187h40 M378 194h40"/>
        </g>
        <circle cx="431" cy="196" r="3" fill="#7fd49a"/>
        <!-- bouche de soufflage côté séjour -->
        <rect x="300" y="172" width="24" height="20" rx="3" fill="#8f9ba5"/>
        <g stroke="#6c7883" stroke-width="1.8">
            <path d="M304 178h16 M304 183h16 M304 188h16"/>
        </g>
    </g>

    <!-- Rideaux thermiques : repliés de part et d'autre de la fenêtre, sur leur
         tringle. Petit geste, petit effet — ils habillent la baie sans jamais
         prétendre remplacer un vitrage. -->
    <g class="curtains">
        <rect x="62" y="186" width="136" height="5" rx="2.5" fill="#7d6b52"/>
        <circle cx="64" cy="188.5" r="4" fill="#94815f"/>
        <circle cx="196" cy="188.5" r="4" fill="#94815f"/>
        <path d="M66 190 h20 q-5 44 0 96 h-20 q5 -48 0 -96z" fill="#7b5a68"/>
        <path d="M74 190 q-4 48 0 96" stroke="#95707f" stroke-width="3" fill="none" opacity=".7"/>
        <path d="M174 190 h20 q-5 44 0 96 h-20 q5 -48 0 -96z" fill="#7b5a68"/>
        <path d="M186 190 q-4 48 0 96" stroke="#95707f" stroke-width="3" fill="none" opacity=".7"/>
    </g>

    <!-- ===== plancher / dalle ===== -->
    <rect x="26" y="372" width="468" height="12" fill="#7d6b52"/>
    <rect x="26" y="372" width="468" height="3" fill="#94815f"/>
</svg>
