<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 42 108" width="42" height="108" overflow="visible">
    <!-- Chauffe-eau thermodynamique : un ballon SURMONTÉ de sa petite pompe à
         chaleur (le capot ventilé). C'est ce capot qui le distingue d'un ballon
         électrique ordinaire — et qui dit d'où vient le gain : l'appareil prend
         des calories dans l'air au lieu de tout produire par résistance.
         Posé dans la chaufferie, avec la chaudière : même local, même tuyauterie. -->
    <ellipse cx="21" cy="104" rx="17" ry="3.5" fill="#000" opacity=".2"/>
    <!-- ballon -->
    <rect x="4" y="30" width="34" height="72" rx="8" fill="#c9d2da"/>
    <rect x="4" y="30" width="10" height="72" rx="8" fill="#dde4ea"/>
    <rect x="12" y="66" width="18" height="12" rx="2" fill="#1c242e"/>
    <circle cx="17" cy="72" r="2" fill="#7fd49a"/>
    <rect x="21" y="70" width="7" height="4" rx="2" fill="#3d4a56"/>
    <!-- capot : une PRISE D'AIR à persiennes, pas une hélice. Dans cette scène
         le ventilateur qui tourne est la signature de la pompe à chaleur ; en
         donner un au ballon le ferait lire comme une seconde PAC. Les
         persiennes disent la même chose (l'appareil aspire l'air ambiant) sans
         voler ce repère. -->
    <rect x="2" y="4" width="38" height="28" rx="6" fill="#8f9ba5"/>
    <rect x="2" y="4" width="38" height="6" rx="3" fill="#b3bdc6"/>
    <rect x="7" y="13" width="28" height="16" rx="2" fill="#2b3642"/>
    <g stroke="#8794a0" stroke-width="2.5" stroke-linecap="round">
        <path d="M10 26 l22 -3 M10 21 l22 -3 M10 16 l22 -3"/>
    </g>
    <!-- piquages eau -->
    <path d="M12 30 v-4 M30 30 v-4" stroke="#6c7883" stroke-width="3" stroke-linecap="round"/>
</svg>
